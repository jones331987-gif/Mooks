    // ─── ENCOUNTER BUILDER TAB ────────────────────────────────────────────────
    function EncounterBuilder({ encounter, setEncounter, setShowSummary }) {
      const [search, setSearch] = useState("");
      const [tierFilter, setTierFilter] = useState("All");
      const [catFilter, setCatFilter] = useState("all");
      const [dragFromList, setDragFromList] = useState(null); // enemy dragged from source list
      const [dragFromEncounter, setDragFromEncounter] = useState(null); // index dragged in encounter
      const [dragOverEncounter, setDragOverEncounter] = useState(null);
      const dropZoneRef = useRef(null);
      const [dropZoneActive, setDropZoneActive] = useState(false);

      const filtered = ALL_ENEMIES.filter(e => {
        const matchS = e.name.toLowerCase().includes(search.toLowerCase());
        const matchT = tierFilter === "All" || e.tier === tierFilter;
        const matchC = catFilter === "all" || e.category === catFilter;
        return matchS && matchT && matchC;
      });

      function addEnemy(enemy) {
        setEncounter(prev => {
          const existing = prev.findIndex(e => e.name === enemy.name && e.tier === enemy.tier);
          if (existing >= 0) {
            const next = [...prev];
            next[existing] = { ...next[existing], count: next[existing].count + 1 };
            return next;
          }
          return [...prev, { ...enemy, count: 1, uid: Date.now() + Math.random() }];
        });
      }

      function removeEnemy(index) {
        setEncounter(prev => prev.filter((_,i) => i !== index));
      }

      function changeCount(index, delta) {
        setEncounter(prev => {
          const next = [...prev];
          const newCount = next[index].count + delta;
          if (newCount < 1) { next.splice(index,1); return next; }
          next[index] = { ...next[index], count: newCount };
          return next;
        });
      }

      // Dragging FROM source list INTO drop zone
      function handleSourceDragStart(e, enemy) {
        setDragFromList(enemy);
        e.dataTransfer.effectAllowed = "copy";
      }

      function handleDropZoneDragOver(e) {
        e.preventDefault();
        setDropZoneActive(true);
      }

      function handleDropZoneDragLeave() {
        setDropZoneActive(false);
      }

      function handleDropZoneDrop(e) {
        e.preventDefault();
        setDropZoneActive(false);
        if (dragFromList) { addEnemy(dragFromList); setDragFromList(null); }
      }

      // Reordering WITHIN encounter list
      function handleEncounterDragStart(e, index) {
        setDragFromEncounter(index);
        e.dataTransfer.effectAllowed = "move";
      }

      function handleEncounterDragOver(index) {
        setDragOverEncounter(index);
      }

      function handleEncounterDrop(index) {
        if (dragFromEncounter === null || dragFromEncounter === index) { setDragFromEncounter(null); setDragOverEncounter(null); return; }
        setEncounter(prev => {
          const next = [...prev];
          const [moved] = next.splice(dragFromEncounter, 1);
          next.splice(index, 0, moved);
          return next;
        });
        setDragFromEncounter(null);
        setDragOverEncounter(null);
      }

      const totalHP = encounter.reduce((s,e) => s + e.hp * e.count, 0);
      const totalUnits = encounter.reduce((s,e) => s + e.count, 0);

      return (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24, alignItems:"start" }}>
          {/* LEFT: source list */}
          <div>
            <div style={{ fontSize:10, color:"#555", fontFamily:"monospace", letterSpacing:3, textTransform:"uppercase", marginBottom:12 }}>Drag enemies to your encounter →</div>
            {/* filters */}
            <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
              <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{ flex:1, minWidth:120, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:7, padding:"7px 12px", color:"#e0d8c8", fontSize:12, fontFamily:"'Crimson Text',Georgia,serif", outline:"none" }} />
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:8, flexWrap:"wrap" }}>
              {["All","Tier 0","Tier 1","Tier 2"].map(t => (
                <button key={t} onClick={() => setTierFilter(t)} style={{ background: tierFilter===t?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.03)", border:`1px solid ${tierFilter===t?"rgba(255,255,255,0.22)":"rgba(255,255,255,0.08)"}`, borderRadius:6, padding:"5px 11px", color: tierFilter===t?"#f0e8d8":"#666", cursor:"pointer", fontSize:11, fontFamily:"monospace", textTransform:"uppercase", letterSpacing:1 }}>{t}</button>
              ))}
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
              {["all","mooks","elites","bosses"].map(c => (
                <button key={c} onClick={() => setCatFilter(c)} style={{ background: catFilter===c?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.03)", border:`1px solid ${catFilter===c?"rgba(255,255,255,0.22)":"rgba(255,255,255,0.08)"}`, borderRadius:6, padding:"5px 11px", color: catFilter===c?"#f0e8d8":"#666", cursor:"pointer", fontSize:11, fontFamily:"monospace", textTransform:"uppercase", letterSpacing:1 }}>{c}</button>
              ))}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:7, maxHeight:"calc(100vh - 380px)", overflowY:"auto", paddingRight:4 }}>
              {filtered.map((enemy, i) => (
                <div key={`${enemy.tier}-${enemy.name}`} style={{ position:"relative" }}>
                  <EnemyCard
                    enemy={enemy}
                    category={enemy.category}
                    accentColor={ENEMIES[enemy.tier].accent}
                    draggable={true}
                    onDragStart={(e) => handleSourceDragStart(e, enemy)}
                    compact={false}
                  />
                  <button
                    onClick={() => addEnemy(enemy)}
                    style={{ position:"absolute", top:10, right:38, background:"rgba(74,158,255,0.15)", border:"1px solid rgba(74,158,255,0.35)", borderRadius:5, color:"#7bc8ff", cursor:"pointer", fontSize:13, width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", zIndex:2 }}
                    title="Add to encounter"
                  >+</button>
                </div>
              ))}
              {filtered.length === 0 && <div style={{ color:"#444", textAlign:"center", padding:40, fontFamily:"monospace", fontSize:12 }}>No enemies match.</div>}
            </div>
          </div>

          {/* RIGHT: encounter drop zone + list */}
          <div>
            <div style={{ fontSize:10, color:"#555", fontFamily:"monospace", letterSpacing:3, textTransform:"uppercase", marginBottom:12 }}>Encounter Roster</div>

            {/* stats bar */}
            {encounter.length > 0 && (
              <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap" }}>
                {[["Units", totalUnits],["Total HP", totalHP],["Types", encounter.length]].map(([k,v]) => (
                  <div key={k} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:7, padding:"8px 14px", flex:1 }}>
                    <div style={{ fontSize:9, color:"#555", fontFamily:"monospace", textTransform:"uppercase", letterSpacing:1 }}>{k}</div>
                    <div style={{ fontSize:20, color:"#e0d8c8", fontFamily:"'Cinzel',serif", fontWeight:600, marginTop:2 }}>{v}</div>
                  </div>
                ))}
              </div>
            )}

            {/* drop zone */}
            <div
              ref={dropZoneRef}
              onDragOver={handleDropZoneDragOver}
              onDragLeave={handleDropZoneDragLeave}
              onDrop={handleDropZoneDrop}
              style={{ border:`2px dashed ${dropZoneActive?"rgba(74,158,255,0.6)":"rgba(255,255,255,0.08)"}`, borderRadius:12, padding: encounter.length===0?"40px 20px":"12px", marginBottom:12, background: dropZoneActive?"rgba(74,158,255,0.05)":"transparent", transition:"all 0.2s", minHeight:80, display:"flex", flexDirection:"column", gap:8, alignItems: encounter.length===0?"center":"stretch", justifyContent: encounter.length===0?"center":"flex-start" }}
            >
              {encounter.length === 0 ? (
                <div style={{ textAlign:"center", color: dropZoneActive?"rgba(74,158,255,0.8)":"#333", fontFamily:"monospace", fontSize:12, transition:"color 0.2s", userSelect:"none" }}>
                  <div style={{ fontSize:28, marginBottom:8, opacity:0.4 }}>⚔</div>
                  Drag enemies here or click <strong style={{color:"#7bc8ff"}}>+</strong>
                </div>
              ) : (
                encounter.map((item, idx) => (
                  <EncounterRow
                    key={item.uid}
                    item={item}
                    index={idx}
                    onRemove={removeEnemy}
                    onCountChange={changeCount}
                    onDragStart={handleEncounterDragStart}
                    onDragOver={handleEncounterDragOver}
                    onDrop={handleEncounterDrop}
                    isDragOver={dragOverEncounter === idx && dragFromEncounter !== null && dragFromEncounter !== idx}
                  />
                ))
              )}
            </div>

            {encounter.length > 0 && (
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setShowSummary(true)} style={{flex:1,background:"rgba(196,163,90,0.08)",border:"1px solid rgba(196,163,90,0.25)",borderRadius:7,padding:"8px 14px",color:"rgba(196,163,90,0.9)",cursor:"pointer",fontSize:12,fontFamily:"monospace",letterSpacing:1}}>VIEW SUMMARY</button>
                <button onClick={() => { if(confirm("Clear encounter?")) setEncounter([]); }}
                style={{ flex:1, background:"rgba(255,50,50,0.07)", border:"1px solid rgba(255,50,50,0.2)", borderRadius:7, padding:"8px 14px", color:"rgba(255,100,100,0.7)", cursor:"pointer", fontSize:12, fontFamily:"monospace", letterSpacing:1 }}>CLEAR</button>
                <button onClick={() => {
                  const lines = ["ENCOUNTER ROSTER","=".repeat(40),"", ...encounter.map(e => `${e.count}× ${e.name} (${e.level}) — HP: ${e.hp}×${e.count}=${e.hp*e.count}`), "","TOTAL UNITS: "+totalUnits,"TOTAL HP: "+totalHP];
                  navigator.clipboard.writeText(lines.join("\n")).then(()=>alert("Copied to clipboard!"));
                }} style={{ flex:1, background:"rgba(74,158,255,0.07)", border:"1px solid rgba(74,158,255,0.2)", borderRadius:7, padding:"8px 14px", color:"rgba(74,158,255,0.8)", cursor:"pointer", fontSize:12, fontFamily:"monospace", letterSpacing:1 }}>COPY SUMMARY</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── ENEMY INDEX TAB ──────────────────────────────────────────────────────

      return (
        <>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:10, fontFamily:"monospace", letterSpacing:3, color:"#555", textTransform:"uppercase", marginBottom:10 }}>Select Tier</div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              {tiers.map(tier => {

                    <div>{tier}</div>
                    <div style={{ fontSize:10, fontFamily:"monospace", color: isActive?t.accent:"#555", letterSpacing:1, marginTop:3 }}>{total} entries</div>
                  </button>

              })}
            </div>
          </div>
          <div style={{ background:`${accentColor}11`, border:`1px solid ${accentColor}33`, borderRadius:8, padding:"11px 16px", marginBottom:20, display:"flex", alignItems:"center", gap:14 }}>

            <div>
              <div style={{ fontFamily:"'Cinzel',serif", fontSize:15, color:accentColor, fontWeight:600 }}>{tierData.label}</div>
              <div style={{ fontSize:12, color:"#777", fontFamily:"monospace", marginTop:2 }}>
                {tierData.mooks.length} Mooks · {tierData.elites.length} Elites · {tierData.bosses.length} Bosses

            {["all","mooks","elites","bosses"].map(cat => (
              <button key={cat} onClick={() => setCategoryFilter(cat)} style={{ background: categoryFilter===cat?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.03)", border:`1px solid ${categoryFilter===cat?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.08)"}`, borderRadius:8, padding:"9px 16px", color: categoryFilter===cat?"#f0e8d8":"#666", cursor:"pointer", fontSize:12, fontFamily:"monospace", textTransform:"uppercase", letterSpacing:1 }}>{cat}</button>

    // --- ENCOUNTER SUMMARY ---------------------------------------------------
    function EncounterSummary({ encounter, onBack }) {
      const [selected, setSelected] = React.useState(null);

      const totalUnits = encounter.reduce((s,e) => s + e.count, 0);
      const totalHP    = encounter.reduce((s,e) => s + e.hp * e.count, 0);
      const totalStam  = encounter.reduce((s,e) => s + e.stamina * e.count, 0);
      const totalMana  = encounter.reduce((s,e) => s + e.mana * e.count, 0);

      const byTier = {};
      encounter.forEach(e => {
        if (!byTier[e.tier]) byTier[e.tier] = [];
        byTier[e.tier].push(e);
      });

      const sel = selected;
      const selCat = sel ? (CAT_STYLE[sel.category] || CAT_STYLE.mooks) : null;

      return (
        <div>
          <button onClick={onBack} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 16px",color:"#888",cursor:"pointer",fontFamily:"monospace",fontSize:12,letterSpacing:1,marginBottom:24,display:"flex",alignItems:"center",gap:8}}>
            &larr; BACK TO BUILDER

          {encounter.length === 0 ? (
            <div style={{textAlign:"center",padding:"80px 0",color:"#333",fontFamily:"monospace",fontSize:13}}>

                  {[["Total Units",totalUnits],["Total HP",totalHP],["Total Stamina",totalStam],["Total Mana",totalMana]].map(([k,v]) => (
                    <div key={k} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px"}}>

                      <div style={{fontSize:22,color:"#e0d8c8",fontFamily:"'Cinzel',serif",fontWeight:600,marginTop:3}}>{v}</div>

                {Object.entries(byTier).map(([tier, items]) => {

                  return (
                    <div key={tier} style={{marginBottom:16}}>
                      <div style={{fontSize:10,fontFamily:"monospace",letterSpacing:3,color:td.accent,textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid "+td.accent+"33"}}>{tier}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {items.map((item, idx) => {

                          return (
                            <button key={idx} onClick={() => setSelected(isSel ? null : item)}
                              style={{background:isSel?"rgba(74,158,255,0.08)":"rgba(255,255,255,0.03)",border:"1px solid "+(isSel?c.border:"rgba(255,255,255,0.08)"),borderRadius:8,padding:"9px 12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s",boxShadow:isSel?"0 0 12px "+c.border:"none"}}>
                              <span style={{background:c.pill,color:"#fff",fontSize:8,fontFamily:"monospace",fontWeight:700,letterSpacing:2,padding:"1px 5px",borderRadius:3,textTransform:"uppercase",flexShrink:0}}>{c.label}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{color:"#f0e8d8",fontSize:13,fontFamily:"'Crimson Text',Georgia,serif",fontWeight:700}}>{item.name}</div>
                                <div style={{color:"#666",fontSize:10,fontFamily:"monospace"}}>x{item.count} &middot; HP:{item.hp} SP:{item.stamina}{item.mana>0?" MP:"+item.mana:""}</div>
                              </div>
                              <span style={{color:isSel?"#7bc8ff":"#333",fontSize:11,flexShrink:0}}>{isSel ? "<<" : ">>"}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div>
                {!sel ? (
                  <div style={{border:"1px dashed rgba(255,255,255,0.07)",borderRadius:12,padding:"80px 40px",textAlign:"center",color:"#2a2d35"}}>
                    <div style={{fontSize:36,marginBottom:12,opacity:0.5}}>&#9668;</div>
                    <div style={{fontFamily:"monospace",fontSize:12,letterSpacing:2}}>SELECT AN ENEMY TO INSPECT</div>
                    <div style={{fontFamily:"monospace",fontSize:10,color:"#222",marginTop:8}}>Click any entry on the left</div>
                  </div>
                ) : (
                  <div style={{background:selCat.bg,border:"1px solid "+selCat.border,borderRadius:14,overflow:"hidden",boxShadow:"0 0 30px "+selCat.border}}>

                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                            <span style={{background:selCat.pill,color:"#fff",fontSize:9,fontFamily:"monospace",fontWeight:700,letterSpacing:2,padding:"2px 7px",borderRadius:3,textTransform:"uppercase"}}>{selCat.label}</span>
                            <span style={{color:"#555",fontSize:11,fontFamily:"monospace"}}>{sel.tier}</span>

                          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:26,fontWeight:700,color:"#f0e8d8",margin:"0 0 4px",letterSpacing:1}}>{sel.name}</h2>

                        <div style={{textAlign:"right",background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 18px",flexShrink:0}}>
                          <div style={{fontSize:9,color:"#555",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>In Encounter</div>

                          <div style={{fontSize:11,color:"#666",fontFamily:"monospace",marginTop:2}}>Total HP: {sel.hp*sel.count}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
                        {[["HP","&#10084;&#65039;",sel.hp],["Stamina","&#9889;",sel.stamina],sel.mana>0?["Mana","&#128302;",sel.mana]:null,["Parry","&#128302;",sel.parry],["Armor","&#9876;",sel.armor],sel.ward?["Ward","&#10024;",sel.ward]:null].filter(Boolean).map(([k,icon,v])=>(
                          <div key={k} style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"7px 11px",textAlign:"center",flex:1,minWidth:56}}>
                            <div style={{fontSize:11,color:"#666",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}}>{k}</div>
                            <div style={{fontSize:17,color:"#e0d8c8",fontFamily:"'Cinzel',serif",fontWeight:600,marginTop:3}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div style={{padding:"20px 24px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:22}}>
                        <div>
                          <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Attributes</div>
                          {[["STR",sel.str],["DEX",sel.dex],["MIN",sel.min],["WIL",sel.wil],["VIG",sel.vig]].map(([k,v])=>{
                            const num=parseInt(v)||0; const pct=Math.min((num/20)*100,100);
                            return (
                              <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                                <span style={{width:36,fontSize:11,color:"#aaa",fontFamily:"monospace",textAlign:"right"}}>{k}</span>
                                <div style={{flex:1,height:7,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
                                  <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,#4a9eff,#7bc8ff)",borderRadius:4}}/>
                                </div>
                                <span style={{width:40,fontSize:11,color:"#ccc",fontFamily:"monospace"}}>{v}</span>
                              </div>
                            );
                          })}

                          <div style={{marginTop:16}}>
                            <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>Combat Stats</div>
                            {[["Damage",sel.damage],["Accuracy",sel.accuracy],sel.spellRange?["Spell Range",sel.spellRange+" spaces"]:null,sel.critical?["Crit Bonus",sel.critical]:null,["Speed",sel.speed+" spaces"]].filter(Boolean).map(([k,v])=>(
                              <div key={k} style={{marginBottom:7,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:"6px 10px"}}>
                                <div style={{fontSize:9,color:"#555",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}}>{k}</div>
                                <div style={{fontSize:13,color:"#c8b8a0",fontFamily:"'Crimson Text',Georgia,serif",marginTop:2}}>{v}</div>
                              </div>
                            ))}
                          </div>

                          <div style={{marginTop:16}}>
                            <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Equipment</div>
                            <div style={{fontSize:12,color:"#a8a090",fontFamily:"'Crimson Text',Georgia,serif",lineHeight:1.7,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:7,padding:"9px 12px"}}>{sel.equipment}</div>
                          </div>

                          <div style={{marginTop:12}}>
                            <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Loot</div>
                            <div style={{fontSize:12,color:"#a8c880",fontFamily:"'Crimson Text',Georgia,serif",background:"rgba(168,200,128,0.05)",border:"1px solid rgba(168,200,128,0.15)",borderRadius:7,padding:"8px 12px"}}>{sel.loot}</div>
                          </div>
                        </div>

                        <div>
                          <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Abilities</div>
                          {sel.abilities.map((ab,i) => <AbilityTag key={i} ability={ab} />)}
                          <div style={{marginTop:16}}>
                            <div style={{fontSize:10,color:"#555",fontFamily:"monospace",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Tactics</div>
                            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"12px 14px",fontSize:13,color:"#b0a898",fontFamily:"'Crimson Text',Georgia,serif",lineHeight:1.8,fontStyle:"italic"}}>{sel.tactics}</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

// ─── ROOT APP ─────────────────────────────────────────────────────────────
    function App() {
      const { useState } = React;
      const [activeTab, setActiveTab] = useState("index");
      const [encounter, setEncounter] = useState([]);
      const [showSummary, setShowSummary] = useState(false);

      const tabs = [
        { id:"index", label:"Enemy Index", icon:"📖" },
        { id:"encounter", label:"Encounter Builder", icon:"⚔", badge: encounter.reduce((s,e)=>s+e.count,0)||null },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"#0d0f14", color:"#e0d8c8", fontFamily:"'Crimson Text',Georgia,serif" }}>
          {/* Header */}
          <div style={{ borderBottom:"1px solid rgba(255,255,255,0.07)", padding:"24px 40px 0", background:"linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%)" }}>
            <div style={{ maxWidth:1200, margin:"0 auto" }}>
              <div style={{ fontSize:10, fontFamily:"monospace", letterSpacing:4, color:"#444", textTransform:"uppercase", marginBottom:5 }}>TSR Combat System</div>
              <h1 style={{ fontFamily:"'Cinzel',serif", fontSize:32, fontWeight:700, color:"#f0e8d8", margin:"0 0 20px", letterSpacing:1 }}>Enemies 5.0</h1>
              {/* Tabs */}
              <div style={{ display:"flex", gap:2 }}>
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background: activeTab===tab.id?"rgba(255,255,255,0.06)":"transparent", border:"none", borderBottom: activeTab===tab.id?"2px solid #C4A35A":"2px solid transparent", borderRadius:"8px 8px 0 0", padding:"10px 20px", color: activeTab===tab.id?"#f0e8d8":"#666", cursor:"pointer", fontSize:13, fontFamily:"'Cinzel',serif", fontWeight: activeTab===tab.id?600:400, display:"flex", alignItems:"center", gap:8, transition:"all 0.2s", position:"relative" }}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {tab.badge ? <span style={{ background:"#C4A35A", color:"#0d0f14", fontSize:10, fontFamily:"monospace", fontWeight:700, borderRadius:10, padding:"1px 7px", marginLeft:2 }}>{tab.badge}</span> : null}
                  </button>
                ))}
              {activeTab === "encounter" && encounter.length > 0 && (
                <button onClick={() => setShowSummary(s => !s)} style={{marginLeft:"auto",background:showSummary?"rgba(196,163,90,0.12)":"rgba(255,255,255,0.04)",border:"1px solid "+(showSummary?"rgba(196,163,90,0.45)":"rgba(255,255,255,0.1)"),borderRadius:"8px 8px 0 0",padding:"10px 18px",color:showSummary?"#C4A35A":"#777",cursor:"pointer",fontSize:12,fontFamily:"'Cinzel',serif",display:"flex",alignItems:"center",gap:7,transition:"all 0.2s"}}>
                  <span>&#128203;</span><span>{showSummary ? "Builder" : "Summary"}</span>
                </button>
              )}
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth:1200, margin:"0 auto", padding:"28px 40px" }}>
            {activeTab === "index" ? <EnemyIndex /> : (showSummary ? <EncounterSummary encounter={encounter} onBack={() => setShowSummary(false)} /> : <EncounterBuilder encounter={encounter} setEncounter={setEncounter} setShowSummary={setShowSummary} />)}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
