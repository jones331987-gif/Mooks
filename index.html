function StatBar({ label, value, max = 25 }) {
  const num = parseInt(value) || 0;
  const pct = Math.min((num / max) * 100, 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
      <span style={{ width: 70, fontSize: 11, color: "#aaa", fontFamily: "monospace", textAlign: "right" }}>{label}</span>
      <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.08)", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: "linear-gradient(90deg, #4a9eff, #7bc8ff)", borderRadius: 3, transition: "width 0.4s ease" }} />
      </div>
      <span style={{ width: 30, fontSize: 11, color: "#ccc", fontFamily: "monospace" }}>{value}</span>
    </div>
  );
}

function AbilityTag({ ability }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ marginBottom: 6 }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          background: open ? "rgba(74,158,255,0.15)" : "rgba(255,255,255,0.06)",
          border: `1px solid ${open ? "rgba(74,158,255,0.4)" : "rgba(255,255,255,0.12)"}`,
          borderRadius: 6,
          padding: "5px 10px",
          color: open ? "#7bc8ff" : "#ccc",
          cursor: "pointer",
          fontSize: 12,
          fontFamily: "'Crimson Text', Georgia, serif",
          fontWeight: 600,
          width: "100%",
          textAlign: "left",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          transition: "all 0.2s",
        }}
      >
        <span>{ability.name}</span>
        <span style={{ fontSize: 10, opacity: 0.7 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{
          background: "rgba(74,158,255,0.05)",
          border: "1px solid rgba(74,158,255,0.2)",
          borderTop: "none",
          borderRadius: "0 0 6px 6px",
          padding: "8px 12px",
          fontSize: 12,
          color: "#adc8e8",
          lineHeight: 1.5,
          fontFamily: "'Crimson Text', Georgia, serif",
        }}>
          {ability.desc}
        </div>
      )}
    </div>
  );
}

function EnemyCard({ enemy, accentColor, category }) {
  const [expanded, setExpanded] = useState(false);
  const cat = categoryColors[category];

  return (
    <div style={{
      background: cat.bg,
      border: `1px solid ${cat.border}`,
      borderRadius: 12,
      overflow: "hidden",
      transition: "box-shadow 0.2s",
      boxShadow: expanded ? `0 0 20px ${cat.border}` : "none",
    }}>
      <button
        onClick={() => setExpanded(!expanded)}
        style={{
          width: "100%",
          background: "transparent",
          border: "none",
          cursor: "pointer",
          padding: "14px 18px",
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          textAlign: "left",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{
            background: cat.border,
            color: "#fff",
            fontSize: 9,
            fontFamily: "monospace",
            fontWeight: 700,
            letterSpacing: 2,
            padding: "2px 7px",
            borderRadius: 3,
            textTransform: "uppercase",
          }}>{cat.label}</span>
          <div>
            <div style={{ color: "#f0e8d8", fontSize: 16, fontFamily: "'Crimson Text', Georgia, serif", fontWeight: 700 }}>
              {enemy.name}
            </div>
            <div style={{ color: "#888", fontSize: 11, fontFamily: "monospace", marginTop: 1 }}>
              {enemy.level}
            </div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", gap: 12, fontSize: 12, color: "#aaa" }}>
            <span>❤️ {enemy.hp}</span>
            <span>⚡ {enemy.stamina}</span>
            {enemy.mana > 0 && <span>🔮 {enemy.mana}</span>}
          </div>
          <span style={{ color: "#555", fontSize: 14 }}>{expanded ? "▲" : "▼"}</span>
        </div>
      </button>

      {expanded && (
        <div style={{ padding: "0 18px 18px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ paddingTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            {/* Left column */}
            <div>
              <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Attributes</div>
              <StatBar label="STR" value={enemy.str} max={20} />
              <StatBar label="DEX" value={enemy.dex} max={20} />
              <StatBar label="MIN" value={enemy.min} max={20} />
              <StatBar label="WIL" value={enemy.wil} max={20} />
              <StatBar label="VIG" value={enemy.vig} max={20} />

              <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {[
                  ["Parry", enemy.parry],
                  ["Armor", enemy.armor],
                  enemy.ward ? ["Ward", enemy.ward] : null,
                  ["Speed", `${enemy.speed} sp`],
                  enemy.spellRange ? ["Spell Range", enemy.spellRange] : null,
                  enemy.critical ? ["Crit Bonus", enemy.critical] : null,
                ].filter(Boolean).map(([k, v]) => (
                  <div key={k} style={{
                    background: "rgba(255,255,255,0.04)",
                    border: "1px solid rgba(255,255,255,0.08)",
                    borderRadius: 6,
                    padding: "6px 10px",
                  }}>
                    <div style={{ fontSize: 9, color: "#666", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: 1 }}>{k}</div>
                    <div style={{ fontSize: 13, color: "#e0d8c8", fontFamily: "'Crimson Text', Georgia, serif", fontWeight: 600, marginTop: 2 }}>{v}</div>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 8, textTransform: "uppercase" }}>Combat Stats</div>
                {[
                  ["Damage", enemy.damage],
                  ["Accuracy", enemy.accuracy],
                ].map(([k, v]) => (
                  <div key={k} style={{ marginBottom: 6 }}>
                    <span style={{ fontSize: 10, color: "#666", fontFamily: "monospace", textTransform: "uppercase" }}>{k}: </span>
                    <span style={{ fontSize: 12, color: "#c8b8a0", fontFamily: "'Crimson Text', Georgia, serif" }}>{v}</span>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>Equipment</div>

              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>Loot</div>
                <div style={{ fontSize: 12, color: "#a8c880", fontFamily: "'Crimson Text', Georgia, serif" }}>{enemy.loot}</div>
              </div>
            </div>

            {/* Right column */}
            <div>
              <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Abilities</div>
              {enemy.abilities.map((ab, i) => <AbilityTag key={i} ability={ab} />)}

              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 11, color: "#666", fontFamily: "monospace", letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>Tactics</div>
                <div style={{
                  background: "rgba(255,255,255,0.03)",
                  border: "1px solid rgba(255,255,255,0.07)",
                  borderRadius: 8,
                  padding: "10px 12px",
                  fontSize: 12,
                  color: "#b0a898",
                  fontFamily: "'Crimson Text', Georgia, serif",
                  lineHeight: 1.7,
                  fontStyle: "italic",
                }}>
                  {enemy.tactics}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const tiers = Object.keys(enemies);
  const [selectedTier, setSelectedTier] = useState("Tier 0");
  const [search, setSearch] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("all");

  const tierData = enemies[selectedTier];
  const accentColor = tierData.accent;

  const allEnemiesInTier = [
    ...tierData.mooks.map(e => ({ ...e, category: "mooks" })),
    ...tierData.elites.map(e => ({ ...e, category: "elites" })),
    ...tierData.bosses.map(e => ({ ...e, category: "bosses" })),
  ];

  const filtered = allEnemiesInTier.filter(e => {
    const matchSearch = e.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = categoryFilter === "all" || e.category === categoryFilter;
    return matchSearch && matchCat;
  });

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0d0f14",
      color: "#e0d8c8",
      fontFamily: "'Crimson Text', Georgia, serif",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;600;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0f14; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      `}</style>

      {/* Header */}
      <div style={{
        borderBottom: "1px solid rgba(255,255,255,0.08)",
        padding: "28px 40px 22px",
        background: "linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%)",
      }}>
        <div style={{ maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ fontSize: 11, fontFamily: "monospace", letterSpacing: 4, color: "#555", textTransform: "uppercase", marginBottom: 6 }}>TSR Combat System</div>
          <h1 style={{
            fontFamily: "'Cinzel', serif",
            fontSize: 34,
            fontWeight: 700,
            color: "#f0e8d8",
            margin: 0,
            letterSpacing: 1,
          }}>Enemies 5.0</h1>
          <p style={{ color: "#666", fontSize: 14, margin: "6px 0 0", fontFamily: "monospace" }}>
            Enemy Index — {allEnemiesInTier.length} entries in {tierData.label}
          </p>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "28px 40px" }}>
        {/* Tier Selector */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 10, fontFamily: "monospace", letterSpacing: 3, color: "#555", textTransform: "uppercase", marginBottom: 12 }}>Select Tier</div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {tiers.map(tier => {
              const t = enemies[tier];
              const isActive = selectedTier === tier;
              return (
                <button
                  key={tier}
                  onClick={() => { setSelectedTier(tier); setSearch(""); setCategoryFilter("all"); }}
                  style={{
                    background: isActive ? `${t.accent}22` : "rgba(255,255,255,0.03)",
                    border: `1px solid ${isActive ? t.accent : "rgba(255,255,255,0.1)"}`,
                    borderRadius: 8,
                    padding: "10px 20px",
                    color: isActive ? t.accent : "#888",
                    cursor: "pointer",
                    fontFamily: "'Cinzel', serif",
                    fontSize: 13,
                    fontWeight: isActive ? 600 : 400,
                    transition: "all 0.2s",
                    boxShadow: isActive ? `0 0 16px ${t.accent}33` : "none",
                  }}
                >
                  <div>{tier}</div>
                  <div style={{ fontSize: 10, fontFamily: "monospace", color: isActive ? t.accent : "#555", letterSpacing: 1, marginTop: 3 }}>
                    {[...enemies[tier].mooks, ...enemies[tier].elites, ...enemies[tier].bosses].length} entries
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Tier Description */}
        <div style={{
          background: `${accentColor}11`,
          border: `1px solid ${accentColor}33`,
          borderRadius: 8,
          padding: "12px 18px",
          marginBottom: 24,
          display: "flex",
          alignItems: "center",
          gap: 14,
        }}>
          <div style={{ width: 3, height: 36, background: accentColor, borderRadius: 2, flexShrink: 0 }} />
          <div>
            <div style={{ fontFamily: "'Cinzel', serif", fontSize: 16, color: accentColor, fontWeight: 600 }}>{tierData.label}</div>
            <div style={{ fontSize: 12, color: "#888", fontFamily: "monospace", marginTop: 2 }}>
              {tierData.mooks.length} Mooks · {tierData.elites.length} Elites · {tierData.bosses.length} Bosses
              {tierData.elites.length === 0 && tierData.bosses.length === 0 ? " — Elites & Bosses not yet populated." : ""}
            </div>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
          <input
            placeholder="Search enemies..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              flex: 1,
              minWidth: 200,
              background: "rgba(255,255,255,0.05)",
              border: "1px solid rgba(255,255,255,0.12)",
              borderRadius: 8,
              padding: "9px 14px",
              color: "#e0d8c8",
              fontSize: 13,
              fontFamily: "'Crimson Text', Georgia, serif",
              outline: "none",
            }}
          />
          {["all", "mooks", "elites", "bosses"].map(cat => (
            <button
              key={cat}
              onClick={() => setCategoryFilter(cat)}
              style={{
                background: categoryFilter === cat ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.03)",
                border: `1px solid ${categoryFilter === cat ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.08)"}`,
                borderRadius: 8,
                padding: "9px 16px",
                color: categoryFilter === cat ? "#f0e8d8" : "#666",
                cursor: "pointer",
                fontSize: 12,
                fontFamily: "monospace",
                textTransform: "uppercase",
                letterSpacing: 1,
                transition: "all 0.15s",
              }}
            >
              {cat}
            </button>
          ))}
        </div>

        {/* Enemy Cards */}
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", color: "#555", padding: 60, fontFamily: "monospace", fontSize: 13 }}>
              No enemies found.
            </div>
          ) : (
            filtered.map((enemy, i) => (
              <EnemyCard key={`${enemy.name}-${i}`} enemy={enemy} accentColor={accentColor} category={enemy.category} />
            ))
          )}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
